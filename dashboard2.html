<!DOCTYPE html>
<html>
<head>
    <title>A2A Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .accept { background: #d4edda; color: #155724; }
        .reject { background: #f8d7da; color: #721c24; }
        .maybe { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>🛒 A2A Marketplace Dashboard</h1>

    <div class="form-group">
        <label>Item Name:</label>
        <input type="text" id="itemName" value="Laptop">
    </div>

    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" value="80">
    </div>

    <div class="form-group">
        <label>Buyer Budget ($):</label>
        <input type="number" id="budget" value="100">
    </div>

    <button onclick="evaluate()">Simulate</button>
    <div id="result"></div>

    <script>
    function evaluate() {
        const price = parseFloat(document.getElementById('price').value);
        const budget = parseFloat(document.getElementById('budget').value);
        const itemName = document.getElementById('itemName').value;

        let decision, reason, cls;
        if (price > budget) {
            decision = '❌ REJECT'; reason = 'Over budget'; cls = 'reject';
        } else if (price < budget * 0.6) {
            decision = '✅ ACCEPT'; reason = 'Good deal'; cls = 'accept';
        } else {
            decision = '🤔 MAYBE'; reason = 'Fair price'; cls = 'maybe';
        }

        document.getElementById('result').innerHTML =
            '<div class="result ' + cls + '"><strong>' + decision + '</strong><br>' +
            itemName + ' at $' + price + ': ' + reason + '</div>';
    }
    </script>
</body>
</html>
