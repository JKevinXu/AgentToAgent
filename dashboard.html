<!DOCTYPE html>
<html>
<head>
    <title>A2A Marketplace Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .accept { background: #d4edda; color: #155724; }
        .reject { background: #f8d7da; color: #721c24; }
        .maybe { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>🛒 A2A Marketplace Dashboard</h1>
    <h3>Simulate Buyer Behavior</h3>

    <div class="form-group">
        <label>Item Name:</label>
        <input type="text" id="itemName" value="Laptop">
    </div>

    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" value="80">
    </div>

    <div class="form-group">
        <label>Buyer Budget ($):</label>
        <input type="number" id="budget" value="100">
    </div>

    <button onclick="simulateBuyer()">Simulate Buyer Evaluation</button>

    <div id="result"></div>

    <script>
        function simulateBuyer() {
            const price = parseFloat(document.getElementById('price').value);
            const budget = parseFloat(document.getElementById('budget').value);
            const itemName = document.getElementById('itemName').value;

            // Buyer 1 evaluation
            let decision1, reason1, className1;
            if (price > budget) {
                decision1 = 'reject'; reason1 = `Over budget ($${budget})`; className1 = 'reject';
            } else if (price < budget * 0.6) {
                decision1 = 'accept'; reason1 = 'Good deal'; className1 = 'accept';
            } else {
                decision1 = 'maybe'; reason1 = 'Fair price'; className1 = 'maybe';
            }

            // Buyer 2 evaluation (budget-conscious)
            let decision2, reason2, className2;
            if (price > 70) {
                decision2 = 'reject'; reason2 = 'Too expensive'; className2 = 'reject';
            } else if (price < 40) {
                decision2 = 'accept'; reason2 = 'Excellent deal!'; className2 = 'accept';
            } else {
                decision2 = 'maybe'; reason2 = 'Acceptable price'; className2 = 'maybe';
            }

            const icon1 = decision1 === 'accept' ? '✅' : decision1 === 'reject' ? '❌' : '🤔';
            const icon2 = decision2 === 'accept' ? '✅' : decision2 === 'reject' ? '❌' : '🤔';

            document.getElementById('result').innerHTML = `
                <div class="result ${className1}">
                    <strong>${icon1} BUYER 1: ${decision1.toUpperCase()}</strong><br>
                    ${itemName} at $${price}: ${reason1}
                </div>
                <div class="result ${className2}">
                    <strong>${icon2} BUYER 2: ${decision2.toUpperCase()}</strong><br>
                    ${itemName} at $${price}: ${reason2}
                </div>
            `;
        }
    </script>
</body>
</html>
