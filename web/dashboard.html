<!DOCTYPE html>
<html>
<head>
    <title>A2A Marketplace Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .buy { background: #d4edda; color: #155724; }
        .not_buy { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🛒 A2A Marketplace Dashboard</h1>
    <h3>Simulate Buyer Behavior</h3>

    <div class="form-group">
        <label>Item Name:</label>
        <input type="text" id="itemName" value="Laptop">
    </div>

    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" value="80">
    </div>

    <button onclick="simulateBuyer()">Simulate Buyer Evaluation</button>

    <div id="result"></div>

    <script>
        function simulateBuyer() {
            const price = parseFloat(document.getElementById('price').value);
            const itemName = document.getElementById('itemName').value;

            // Buyer 1 evaluation
            let decision1, reason1, className1;
            if (price > 120) {
                decision1 = 'not_buy'; reason1 = 'Overpriced'; className1 = 'not_buy';
            } else if (price < 60) {
                decision1 = 'buy'; reason1 = 'Good deal'; className1 = 'buy';
            } else {
                decision1 = 'buy'; reason1 = 'Fair price'; className1 = 'buy';
            }

            // Buyer 2 evaluation (conservative)
            let decision2, reason2, className2;
            if (price > 70) {
                decision2 = 'not_buy'; reason2 = 'Too expensive'; className2 = 'not_buy';
            } else if (price < 40) {
                decision2 = 'buy'; reason2 = 'Excellent deal!'; className2 = 'buy';
            } else {
                decision2 = 'buy'; reason2 = 'Acceptable price'; className2 = 'buy';
            }

            const icon1 = decision1 === 'buy' ? '✅' : '❌';
            const icon2 = decision2 === 'buy' ? '✅' : '❌';

            document.getElementById('result').innerHTML = `
                <div class="result ${className1}">
                    <strong>${icon1} BUYER 1: ${decision1.toUpperCase()}</strong><br>
                    ${itemName} at $${price}: ${reason1}
                </div>
                <div class="result ${className2}">
                    <strong>${icon2} BUYER 2: ${decision2.toUpperCase()}</strong><br>
                    ${itemName} at $${price}: ${reason2}
                </div>
            `;
        }
    </script>
</body>
</html>
