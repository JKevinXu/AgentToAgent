<!DOCTYPE html>
<html>
<head>
    <title>A2A Live Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 50px auto; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 15px; padding: 15px; border-radius: 5px; }
        .buy { background: #d4edda; color: #155724; }
        .not_buy { background: #f8d7da; color: #721c24; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>🛒 A2A Live Dashboard</h1>
    <p>Connected to real Python agents via HTTP</p>

    <div class="form-group">
        <label>Item Name:</label>
        <input type="text" id="itemName" value="Laptop">
    </div>

    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" value="80">
    </div>

    <button onclick="evaluateLive()">Evaluate with Real Agents</button>
    <div id="result"></div>

    <h3>Agent Logs</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <div>
            <strong>Buyer 1</strong>
            <div id="logs-buyer1" style="background: #e3f2fd; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px;"></div>
        </div>
        <div>
            <strong>Buyer 2</strong>
            <div id="logs-buyer2" style="background: #f3e5f5; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px;"></div>
        </div>
        <div>
            <strong>Browser Buyer</strong>
            <div id="logs-browser" style="background: #fff3e0; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px;"></div>
        </div>
    </div>

    <script>
    const API_URL = 'http://localhost:8000';
    let logs = {buyer1: [], buyer2: [], browser: []};

    function addLog(buyer, message) {
        const now = new Date();
        const timestamp = now.toLocaleTimeString() + '.' + now.getMilliseconds().toString().padStart(3, '0');
        logs[buyer].push(`[${timestamp}] ${message}`);
        document.getElementById(`logs-${buyer}`).innerHTML = logs[buyer].join('<br>');
        document.getElementById(`logs-${buyer}`).scrollTop = document.getElementById(`logs-${buyer}`).scrollHeight;
    }

    async function evaluateLive() {
        const price = parseFloat(document.getElementById('price').value);
        const itemName = document.getElementById('itemName').value;

        document.getElementById('result').innerHTML = '<div class="loading">Calling real agents...</div>';

        try {
            // Call seller agent (seller will query buyer)
            const response = await fetch(`${API_URL}/agent/seller`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    jsonrpc: '2.0',
                    method: 'request_evaluation',
                    params: {price: price, name: itemName},
                    id: '1'
                })
            });

            const data = await response.json();
            const evaluations = data.result.evaluations;

            // Display logs with actual server timestamps
            evaluations.forEach(eval => {
                const buyerKey = eval.buyer === 'buyer1' ? 'buyer1' :
                                 eval.buyer === 'buyer2' ? 'buyer2' : 'browser';
                const displayName = eval.display_name || eval.buyer;

                // Use server timestamps
                const startTime = new Date(eval.start_time).toLocaleTimeString() + '.' +
                                  new Date(eval.start_time).getMilliseconds().toString().padStart(3, '0');
                const endTime = new Date(eval.end_time).toLocaleTimeString() + '.' +
                                new Date(eval.end_time).getMilliseconds().toString().padStart(3, '0');

                // Log with actual timestamps
                logs[buyerKey].push(`[${startTime}] Request: ${itemName} at $${price}`);
                logs[buyerKey].push(`[${endTime}] Decision: ${eval.result.decision} (${eval.elapsed_ms}ms)`);
                logs[buyerKey].push(`[${endTime}] Reason: ${eval.result.reason || 'Score: ' + eval.result.score}`);
                document.getElementById(`logs-${buyerKey}`).innerHTML = logs[buyerKey].join('<br>');
            });

            let html = '';
            evaluations.forEach(eval => {
                const result = eval.result;
                let cls = result.decision === 'buy' ? 'buy' : 'not_buy';
                let icon = result.decision === 'buy' ? '✅' : '❌';

                html += `<div class="result ${cls}">
                    <strong>${icon} ${eval.buyer.toUpperCase()}: ${result.decision.toUpperCase()}</strong><br>
                    ${itemName} at $${price}: ${result.reason}
                </div>`;
            });

            document.getElementById('result').innerHTML = html;

        } catch (error) {
            addLog('buyer1', `ERROR: ${error.message}`);
            addLog('buyer2', `ERROR: ${error.message}`);
            addLog('browser', `ERROR: ${error.message}`);
            document.getElementById('result').innerHTML =
                '<div class="result reject">Error: Server not running. Start with: python3 a2a_server.py</div>';
        }
    }
    </script>
</body>
</html>
