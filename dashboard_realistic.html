<!DOCTYPE html>
<html>
<head>
    <title>A2A Realistic Buyer Dashboard</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 50px auto; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 15px; padding: 15px; border-radius: 5px; }
        .accept { background: #d4edda; color: #155724; }
        .reject { background: #f8d7da; color: #721c24; }
        .maybe { background: #fff3cd; color: #856404; }
        .research { background: #e7f3ff; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🛒 A2A Realistic Buyer Dashboard</h1>

    <div class="form-group">
        <label>Item Name:</label>
        <input type="text" id="itemName" value="Laptop">
    </div>

    <div class="form-group">
        <label>Price ($):</label>
        <input type="number" id="price" value="80">
    </div>

    <div class="form-group">
        <label>Buyer Budget ($):</label>
        <input type="number" id="budget" value="100">
    </div>

    <button onclick="simulateRealistic()">Simulate Realistic Buyer</button>
    <div id="result"></div>

    <script>
    const marketPrices = {
        "Laptop": {avg: 85, min: 70, max: 120},
        "Phone": {avg: 55, min: 40, max: 80},
        "Tablet": {avg: 90, min: 75, max: 110}
    };

    function simulateRealistic() {
        const price = parseFloat(document.getElementById('price').value);
        const budget = parseFloat(document.getElementById('budget').value);
        const itemName = document.getElementById('itemName').value;

        let html = '';

        // Realistic Buyer
        html += evaluateRealistic(itemName, price, budget);

        // Buyer 1
        html += evaluateBuyer1(price, budget);

        // Buyer 2
        html += evaluateBuyer2(price);

        // Browser Buyer
        html += evaluateBrowserBuyer(itemName, price);

        document.getElementById('result').innerHTML = html;
    }

    function evaluateRealistic(itemName, price, budget) {
        const market = marketPrices[itemName] || {avg: price, min: price*0.8, max: price*1.2};
        const priceVsMarket = ((price / market.avg - 1) * 100).toFixed(1);

        let score = 0, reasons = [];
        if (priceVsMarket < -20) { score += 40; reasons.push('Great price'); }
        else if (priceVsMarket < 0) { score += 30; reasons.push('Below market'); }
        else if (priceVsMarket < 10) { score += 20; reasons.push('Fair price'); }
        else { reasons.push('Above market'); }

        if (price <= budget * 0.7) { score += 30; reasons.push('Within budget'); }
        else if (price <= budget) { score += 20; }
        else { reasons.push('Over budget'); }

        score += Math.floor(Math.random() * 31);

        let decision, cls;
        if (score >= 70) { decision = '✅ ACCEPT'; cls = 'accept'; }
        else if (score >= 40) { decision = '🤔 MAYBE'; cls = 'maybe'; }
        else { decision = '❌ REJECT'; cls = 'reject'; }

        return '<h3>Realistic Buyer (Market Research)</h3>' +
            '<div class="research">Market: $' + market.avg + ' | Price vs Market: ' + priceVsMarket + '%</div>' +
            '<div class="result ' + cls + '"><strong>' + decision + '</strong> | Score: ' + score + '/100<br>' +
            reasons.join(', ') + '</div>';
    }

    function evaluateBuyer1(price, budget) {
        let decision, reason, cls;
        if (price > budget) { decision = '❌ REJECT'; reason = 'Over budget'; cls = 'reject'; }
        else if (price < budget * 0.6) { decision = '✅ ACCEPT'; reason = 'Good deal'; cls = 'accept'; }
        else { decision = '🤔 MAYBE'; reason = 'Fair price'; cls = 'maybe'; }

        return '<h3>Buyer 1 (Simple Budget)</h3>' +
            '<div class="result ' + cls + '"><strong>' + decision + '</strong><br>' + reason + '</div>';
    }

    function evaluateBuyer2(price) {
        let decision, reason, cls;
        if (price > 70) { decision = '❌ REJECT'; reason = 'Too expensive'; cls = 'reject'; }
        else if (price < 40) { decision = '✅ ACCEPT'; reason = 'Excellent deal!'; cls = 'accept'; }
        else { decision = '🤔 MAYBE'; reason = 'Acceptable price'; cls = 'maybe'; }

        return '<h3>Buyer 2 (Budget-Conscious)</h3>' +
            '<div class="result ' + cls + '"><strong>' + decision + '</strong><br>' + reason + '</div>';
    }

    function evaluateBrowserBuyer(itemName, price) {
        // Simulate browser search
        const sources = [
            {site: "Amazon", price: Math.floor(Math.random() * 30) + 70},
            {site: "eBay", price: Math.floor(Math.random() * 30) + 65},
            {site: "BestBuy", price: Math.floor(Math.random() * 30) + 75}
        ];
        const prices = sources.map(s => s.price);
        const lowest = Math.min(...prices);
        const highest = Math.max(...prices);
        const avg = prices.reduce((a,b) => a+b) / prices.length;

        let score = 0, reasons = [];
        if (price < lowest) { score += 50; reasons.push('Below all competitors'); }
        else if (price <= avg) { score += 35; reasons.push('Below average'); }
        else { reasons.push('Above average'); }
        score += Math.floor(Math.random() * 31);

        let decision, cls;
        if (score >= 60) { decision = '✅ ACCEPT'; cls = 'accept'; }
        else if (score >= 35) { decision = '🤔 MAYBE'; cls = 'maybe'; }
        else { decision = '❌ REJECT'; cls = 'reject'; }

        return '<h3>Browser Buyer (Multi-Source)</h3>' +
            '<div class="research">Competitors: $' + lowest + '-$' + highest + ' (avg: $' + avg.toFixed(0) + ')</div>' +
            '<div class="result ' + cls + '"><strong>' + decision + '</strong> | Score: ' + score + '/100<br>' +
            reasons.join(', ') + '</div>';
    }
    </script>
</body>
</html>
